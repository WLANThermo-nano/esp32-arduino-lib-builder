name: Build arduino-esp32 3.x + CONFIG_PM_ENABLE

on:
  workflow_dispatch:
    inputs:
      arduino_tag:
        description: 'arduino-esp32 tag (siehe github.com/espressif/arduino-esp32/releases)'
        required: true
        default: '3.1.3'
      dry_run:
        description: 'true = Artifact statt Release (zum Testen)'
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Checkout esp32-arduino-lib-builder
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: bash ./tools/prepare-ci.sh

      - name: Checkout arduino-esp32 ${{ inputs.arduino_tag }}
        uses: actions/checkout@v4
        with:
          repository: espressif/arduino-esp32
          ref: ${{ inputs.arduino_tag }}
          path: arduino-esp32
          fetch-depth: 1
          filter: blob:none

      - name: Create defconfig.pm_enable
        run: |
          printf 'CONFIG_PM_ENABLE=y\nCONFIG_FREERTOS_USE_TICKLESS_IDLE=y\n' \
            > configs/defconfig.pm_enable
          echo "--- defconfig.pm_enable ---"
          cat configs/defconfig.pm_enable

      - name: Build ESP32 SDK with CONFIG_PM_ENABLE
        run: |
          ./build.sh \
            -t esp32 \
            -c ${{ github.workspace }}/arduino-esp32 \
            pm_enable
        timeout-minutes: 90

      - name: Log SDK structure (Pfade verifizieren)
        run: |
          echo "=== arduino-esp32/tools/sdk/esp32/ (2 Ebenen) ==="
          find arduino-esp32/tools/sdk/esp32 -maxdepth 2 | head -30
          echo ""
          echo "=== .a-Dateien in sdk/esp32/ ==="
          find arduino-esp32/tools/sdk/esp32 -name "*.a" | head -10
          echo ""
          df -h

      - name: Create PlatformIO package tarball
        run: |
          PACKAGE="framework-arduinoespressif32-${{ inputs.arduino_tag }}-pm-enable"
          # package.json version aktualisieren damit PlatformIO es korrekt behandelt
          python3 - << 'EOF'
          import json, sys
          with open("arduino-esp32/package.json", "r") as f:
              pkg = json.load(f)
          pkg["version"] = "${{ inputs.arduino_tag }}"
          pkg["name"] = "framework-arduinoespressif32"
          with open("arduino-esp32/package.json", "w") as f:
              json.dump(pkg, f, indent=2)
          print("package.json:", json.dumps(pkg, indent=2))
          EOF
          tar -czf "${PACKAGE}.tar.gz" -C arduino-esp32 .
          ls -lh "${PACKAGE}.tar.gz"

      - name: Upload artifact (dry run)
        if: ${{ inputs.dry_run }}
        uses: actions/upload-artifact@v4
        with:
          name: framework-arduinoespressif32-${{ inputs.arduino_tag }}-pm-enable
          path: framework-arduinoespressif32-${{ inputs.arduino_tag }}-pm-enable.tar.gz
          retention-days: 7

      - name: Create GitHub Release on WLANThermo-nano/arduino-esp32
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.arduino_tag }}-pm-enable
          name: "arduino-esp32 ${{ inputs.arduino_tag }} + CONFIG_PM_ENABLE"
          repository: WLANThermo-nano/arduino-esp32
          body: |
            arduino-esp32 `${{ inputs.arduino_tag }}` mit `CONFIG_PM_ENABLE=y` und
            `CONFIG_FREERTOS_USE_TICKLESS_IDLE=y` für WLANThermo System-Light-Sleep.

            **platformio.ini Einbindung:**
            ```ini
            platform_packages =
                framework-arduinoespressif32 @ https://github.com/WLANThermo-nano/arduino-esp32/releases/download/${{ inputs.arduino_tag }}-pm-enable/framework-arduinoespressif32-${{ inputs.arduino_tag }}-pm-enable.tar.gz
            ```

            **Stromverbrauch:** ~12mA (System-Light-Sleep) statt ~35mA (WiFi-Modem-Sleep) oder ~90mA (kein PSM).

            Gebaut mit [WLANThermo-nano/esp32-arduino-lib-builder](https://github.com/WLANThermo-nano/esp32-arduino-lib-builder).
          files: framework-arduinoespressif32-${{ inputs.arduino_tag }}-pm-enable.tar.gz
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.ARDUINO_ESP32_RELEASE_TOKEN }}
